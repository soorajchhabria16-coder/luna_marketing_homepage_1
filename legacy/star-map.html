<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luna - Interactive Star Map</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="star-map-body">

<header class="navbar">
    <div class="logo">
        <a href="index.html" class="logo-link">
            <i class="fa-solid fa-moon"></i> Luna
        </a>
    </div>
    <nav class="nav-links">
        <a href="index.html#vibe">Today</a>
        <a href="index.html#year-ahead">2026 Year Ahead</a>
        <a href="birth-chart.html">Birth Chart</a>
        <a href="star-map.html" class="active">Star Map</a>
        <a href="astro-101.html">Astro 101</a>
        <a href="app-features.html">App</a>
        <a href="index.html#podcasts">Podcasts</a>
        <a href="index.html#about">About</a>
    </nav>
    <div class="nav-actions">
        <i class="fa-solid fa-magnifying-glass"></i>
    </div>
</header>

<main class="star-map-main">
    <section class="star-map-container">
        <div class="map-bg"></div>
        <canvas id="starMapCanvas"></canvas>
        <div class="star-map-ui reveal">
            <h1>Celestial Map</h1>
            <p>Explore the cosmos. Move your cursor to attract stellar energies and form new constellations in real-time.</p>
        </div>
        
        <div class="map-controls reveal delay-400">
            <button class="control-btn" id="btn-rotate"><i class="fa-solid fa-pause"></i> Pause</button>
            <button class="control-btn active" id="btn-lines"><i class="fa-solid fa-project-diagram"></i> Constellations</button>
            <button class="control-btn" id="btn-speed"><i class="fa-solid fa-forward"></i> Speed</button>
        </div>
    </section>
</main>

<script src="scripts.js"></script>
<script src="star-map.js"></script>
</body>
</html>
